<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestão Empresarial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animação de fundo */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(255,255,255,0.1);stop-opacity:1" /><stop offset="100%" style="stop-color:rgb(255,255,255,0.05);stop-opacity:1" /></linearGradient></defs><rect width="1920" height="1080" fill="url(%23grad)" /></svg>');
            background-size: cover;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 
                0 32px 64px rgba(0, 0, 0, 0.2),
                0 16px 32px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.25),
                0 20px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-card h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
            text-align: center;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #34495e;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-group input:focus + .input-icon {
            color: #667eea;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(231, 76, 60, 0.3);
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message.show {
            display: block;
        }

        .info-section {
            margin-top: 32px;
            padding: 20px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(52, 152, 219, 0.2);
        }

        .info-title {
            color: #2980b9;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-text {
            color: #34495e;
            font-size: 13px;
            line-height: 1.5;
        }

        .credentials {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .credentials code {
            background: rgba(46, 204, 113, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #27ae60;
            font-weight: 600;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-login.loading .spinner {
            display: inline-block;
            margin-right: 8px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                margin: 20px;
            }

            .login-card h1 {
                font-size: 24px;
            }

            .form-group input {
                padding: 14px 14px 14px 44px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">🏢</div>
                <h1>Sistema de Gestão</h1>
                <p class="subtitle">Acesso ao Sistema Empresarial</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required
                            placeholder="Digite seu usuário"
                            autocomplete="username"
                        >
                        <span class="input-icon">👤</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            placeholder="Digite sua senha"
                            autocomplete="current-password"
                        >
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span class="spinner"></span>
                    <span class="btn-text">Entrar no Sistema</span>
                </button>

                <div id="login-error" class="error-message">
                    Usuário ou senha incorretos. Tente novamente.
                </div>
            </form>

            <div class="info-section">
                <div class="info-title">📋 Credenciais de Acesso</div>
                <div class="info-text">
                    Use as seguintes credenciais para acessar o sistema:
                    <div class="credentials">
                        <p><strong>Usuário:</strong> <code>juan</code></p>
                        <p><strong>Senha:</strong> <code>9070</code></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAqeue_aAKObAABUpG0pP_0hj1qJQecElQ",
            authDomain: "sistemajb-909c1.firebaseapp.com",
            databaseURL: "https://sistemajb-909c1-default-rtdb.firebaseio.com",
            projectId: "sistemajb-909c1",
            storageBucket: "sistemajb-909c1.firebasestorage.app",
            messagingSenderId: "74845488953",
            appId: "1:74845488953:web:2b5bf6e044ea4bf014cae8",
            measurementId: "G-S304J5H84J"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sistema de autenticação local
        const USERS = {
            'juan': {
                password: '9070',
                name: 'Juan',
                role: 'admin'
            }
        };

        let currentUser = null;

        // Verificar se já está logado
        document.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                redirectToMain();
            }
        });

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');
            
            // Mostrar loading
            loginBtn.classList.add('loading');
            errorElement.classList.remove('show');
            
            // Simular delay para melhor UX
            setTimeout(() => {
                if (USERS[username] && USERS[username].password === password) {
                    currentUser = {
                        username: username,
                        name: USERS[username].name,
                        role: USERS[username].role
                    };
                    
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    // Animação de sucesso
                    loginBtn.innerHTML = '✅ Acesso Liberado!';
                    loginBtn.style.background = 'linear-gradient(135deg, #27ae60 0%, #229954 100%)';
                    
                    setTimeout(() => {
                        redirectToMain();
                    }, 1000);
                } else {
                    // Animação de erro
                    loginBtn.classList.remove('loading');
                    loginBtn.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
                    loginBtn.innerHTML = '❌ Acesso Negado';
                    
                    errorElement.classList.add('show');
                    
                    // Restaurar botão após 2 segundos
                    setTimeout(() => {
                        loginBtn.style.background = '';
                        loginBtn.innerHTML = '<span class="spinner"></span><span class="btn-text">Entrar no Sistema</span>';
                    }, 2000);
                }
            }, 1000);
        }

        function redirectToMain() {
            window.location.href = 'index.html';
        }

        // Adicionar efeitos de foco
        document.getElementById('username').addEventListener('focus', function() {
            this.parentElement.parentElement.style.transform = 'scale(1.02)';
        });

        document.getElementById('username').addEventListener('blur', function() {
            this.parentElement.parentElement.style.transform = 'scale(1)';
        });

        document.getElementById('password').addEventListener('focus', function() {
            this.parentElement.parentElement.style.transform = 'scale(1.02)';
        });

        document.getElementById('password').addEventListener('blur', function() {
            this.parentElement.parentElement.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
